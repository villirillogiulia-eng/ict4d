<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gambia Sentinel Ingest | CLI Data Portal</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1f2e;
      --bg-tertiary: #242b3d;
      --text-primary: #f5f5f5;
      --text-secondary: #9ca3af;
      --accent: #c5a059;
      --accent-hover: #d4a853;
      --border: #2d3548;
      --destructive: #ef4444;
      --success: #22c55e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    /* Professional Navigation */
    nav {
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(10px);
      padding: 0.8rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.01em;
    }

    .nav-logo i { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 2.2rem;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      transition: color 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .nav-links a:hover { color: var(--accent); }

    .container { display: flex; height: calc(100vh - 60px); }
    .sidebar { width: 380px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; color: var(--accent); }
    .sidebar-header p { font-size: 0.875rem; color: var(--text-secondary); }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 20px; }
    .drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
    .drop-zone:hover { border-color: var(--accent); background: rgba(197, 160, 89, 0.05); }
    .btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--bg-tertiary); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
    .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
    .stat-value { font-size: 1.1rem; font-weight: 700; margin-top: 4px; }
    .filter-select { width: 100%; padding: 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); margin-bottom: 15px; }
    .map-container { flex: 1; }
    #map { width: 100%; height: 100%; }
    .paste-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .paste-modal-content { background: var(--bg-secondary); padding: 24px; border-radius: 16px; width: 90%; max-width: 600px; }
    textarea { width: 100%; height: 200px; background: var(--bg-primary); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo"><i class="fa-solid fa-shield-halved"></i> NBR SENTINEL</a>
    <div class="nav-links">
      <a href="../project_description.html">Overview</a>
      <a href="../risk_dashboard.html">Mission Map</a>
      <a href="../charts.html">Intelligence</a>
      <a href="index.html" style="color: var(--accent);">CSV Ingest</a>
    </div>
  </nav>

  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Sentinel Ingest</h1>
        <p>Gambia Disaster Data Processing</p>
      </div>
      <div class="sidebar-content">
        <div id="drop-zone" class="drop-zone">
          <h3>Drop Gambian CSV here</h3>
          <p>or click to upload</p>
        </div>
        <input type="file" id="file-input" style="display:none">
        
        <button class="btn btn-primary" id="example-btn">Load Gambia Example</button>
        <button class="btn" id="paste-btn">Paste Data Stream</button>
        
        <div id="controls-section" style="display:none">
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Records</div><div class="stat-value" id="stat-events">0</div></div>
            <div class="stat-card"><div class="stat-label">Displaced</div><div class="stat-value" id="stat-displaced">0</div></div>
          </div>
          <select class="filter-select" id="cause-filter"><option value="">All Hazards</option></select>
          <button class="btn" id="clear-btn" style="color:var(--destructive)">Clear Dashboard</button>
        </div>
      </div>
    </aside>
    <main class="map-container"><div id="map"></div></main>
  </div>

  <div class="paste-modal" id="paste-modal">
    <div class="paste-modal-content">
      <h3>Manual Data Ingest</h3>
      <textarea id="paste-textarea" placeholder="Paste CSV data here..."></textarea>
      <button class="btn btn-primary" id="paste-confirm">Process Stream</button>
    </div>
  </div>

  <script>
    let rawData = [], map, markersLayer;

    const GAMBIA_EXAMPLE = `ID,long,lat,Country,MainCause,Severity,Displaced
5133,-15.80,13.55,Gambia,Monsoonal Rain (NBR),1.5,908
5134,-15.52,13.57,Gambia,Flash Flood & Windstorm (Sabach Sanjal),1.5,100
5135,-16.00,13.50,Gambia,Rainfall Deficit / Dry Spell,1,0
5137,-16.54,13.48,Gambia,Coastal Erosion (Barra),1.5,0
5138,-16.45,13.52,Gambia,Salinity Intrusion (Lower Niumi),1.5,0
5149,-16.02,13.51,Gambia,Sept 2025 Flood: Barra-Kerewan Culvert Collapse,2,240
5151,-14.21,13.38,Gambia,Sept 2025 Flood: Basse flash floods,1.5,0`;

    function initMap() {
      map = L.map('map').setView([13.44, -15.45], 8);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
      }).addTo(map);
      markersLayer = L.layerGroup().addTo(map);
    }

    function loadData(csvText) {
      const lines = csvText.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const data = lines.slice(1).map(line => {
        const values = line.split(',');
        const row = {};
        headers.forEach((h, i) => row[h] = values[i]);
        return {
          lat: parseFloat(row.lat),
          lon: parseFloat(row.long || row.lon || row.longitude),
          cause: row.maincause || row.cause || 'Unknown',
          displaced: parseInt(row.displaced) || 0,
          severity: parseFloat(row.severity) || 1
        };
      }).filter(d => !isNaN(d.lat));

      rawData = data;
      render();
    }

    function render() {
      markersLayer.clearLayers();
      const bounds = [];
      let totalDisplaced = 0;

      rawData.forEach(d => {
        totalDisplaced += d.displaced;
        const color = d.severity > 1.5 ? '#ef4444' : '#c5a059';
        const marker = L.circleMarker([d.lat, d.lon], {
          radius: 8, fillColor: color, color: '#fff', weight: 1, fillOpacity: 0.8
        }).bindPopup(`<b>${d.cause}</b><br>Severity: ${d.severity}<br>Displaced: ${d.displaced}`);
        marker.addTo(markersLayer);
        bounds.push([d.lat, d.lon]);
      });

      document.getElementById('stat-events').textContent = rawData.length;
      document.getElementById('stat-displaced').textContent = totalDisplaced.toLocaleString();
      document.getElementById('controls-section').style.display = 'block';
      if (bounds.length) map.fitBounds(bounds, {padding: [50,50]});
    }

    document.addEventListener('DOMContentLoaded', () => {
      initMap();
      document.getElementById('example-btn').onclick = () => loadData(GAMBIA_EXAMPLE);
      document.getElementById('paste-btn').onclick = () => document.getElementById('paste-modal').style.display = 'flex';
      document.getElementById('paste-confirm').onclick = () => {
        loadData(document.getElementById('paste-textarea').value);
        document.getElementById('paste-modal').style.display = 'none';
      };
      document.getElementById('clear-btn').onclick = () => {
        markersLayer.clearLayers();
        document.getElementById('controls-section').style.display = 'none';
      };
    });
  </script>
</body>
</html>
