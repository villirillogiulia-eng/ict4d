<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Historical Flood Archive (1985-2024)</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .map-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            width: 300px;
        }
        .filter-group {
            margin-top: 15px;
        }
        .filter-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .filter-group select {
            width: 100%;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="map-title">
        <h2 style="margin:0; font-size: 20px;">Global Flood Archive</h2>
        <p style="margin:5px 0 0 0; font-size: 13px; color: #666;">Data: Dartmouth Flood Observatory (1985-2021)</p>
        
        <div class="filter-group">
            <label for="yearSelect">Filter by Year:</label>
            <select id="yearSelect">
                <option value="all">All Years</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="countrySelect">Filter by Country:</label>
            <select id="countrySelect">
                <option value="all">All Countries</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="causeSelect">Filter by Cause:</label>
            <select id="causeSelect">
                <option value="all">All Causes</option>
            </select>
        </div>
    </div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <script>
        // 1. Initialize the map
        var map = L.map('map').setView([20, 0], 2);
        var geojsonLayer;
        var allData;

        // 2. Add the base layer
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // 3. Load the GeoJSON data
        fetch('floods.geojson?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                allData = data;
                populateFilters(data);
                updateMap();
            })
            .catch(error => console.error('Error loading the GeoJSON:', error));

        function populateFilters(data) {
            const years = new Set();
            const countries = new Set();
            const causes = new Set();

            data.features.forEach(f => {
                const dateParts = f.properties.date.split('/');
                if (dateParts.length === 3) {
                    let year = dateParts[2];
                    if (year.length === 2) {
                        year = parseInt(year) > 25 ? '19' + year : '20' + year;
                    }
                    years.add(year);
                }
                if (f.properties.country) countries.add(f.properties.country.trim());
                if (f.properties.cause) causes.add(f.properties.cause.trim());
            });

            const yearSelect = document.getElementById('yearSelect');
            Array.from(years).sort().reverse().forEach(year => {
                const opt = document.createElement('option');
                opt.value = year;
                opt.textContent = year;
                yearSelect.appendChild(opt);
            });

            const countrySelect = document.getElementById('countrySelect');
            Array.from(countries).sort().forEach(country => {
                const opt = document.createElement('option');
                opt.value = country;
                opt.textContent = country;
                countrySelect.appendChild(opt);
            });

            const causeSelect = document.getElementById('causeSelect');
            Array.from(causes).sort().forEach(cause => {
                if (cause) {
                    const opt = document.createElement('option');
                    opt.value = cause;
                    opt.textContent = cause;
                    causeSelect.appendChild(opt);
                }
            });

            yearSelect.addEventListener('change', updateMap);
            countrySelect.addEventListener('change', updateMap);
            causeSelect.addEventListener('change', updateMap);
        }

        function updateMap() {
            const selectedYear = document.getElementById('yearSelect').value;
            const selectedCountry = document.getElementById('countrySelect').value;
            const selectedCause = document.getElementById('causeSelect').value;

            if (geojsonLayer) {
                map.removeLayer(geojsonLayer);
            }

            geojsonLayer = L.geoJSON(allData, {
                filter: function(feature) {
                    const dateParts = feature.properties.date.split('/');
                    let year = '';
                    if (dateParts.length === 3) {
                        year = dateParts[2];
                        if (year.length === 2) {
                            year = parseInt(year) > 25 ? '19' + year : '20' + year;
                        }
                    }
                    
                    const yearMatch = selectedYear === 'all' || year === selectedYear;
                    const countryMatch = selectedCountry === 'all' || feature.properties.country.trim() === selectedCountry;
                    const causeMatch = selectedCause === 'all' || feature.properties.cause.trim() === selectedCause;
                    return yearMatch && countryMatch && causeMatch;
                },
                pointToLayer: function (feature, latlng) {
                    return L.circleMarker(latlng, {
                        radius: 5,
                        fillColor: getColor(feature.properties.severity),
                        color: "#fff",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.7
                    });
                },
                onEachFeature: function (feature, layer) {
                    layer.bindPopup(`
                        <div style="font-size: 14px;">
                            <strong>${feature.properties.country}</strong><br>
                            <b>Date:</b> ${feature.properties.date}<br>
                            <b>Cause:</b> ${feature.properties.cause}<br>
                            <b>Severity:</b> ${feature.properties.severity}
                        </div>
                    `);
                }
            }).addTo(map);
        }

        function getColor(d) {
            return d == '2'   ? '#e31a1c' :
                   d == '1.5' ? '#fd8d3c' :
                   d == '1'   ? '#feb24c' :
                                '#ffeda0';
        }
    </script>
</body>
</html>
